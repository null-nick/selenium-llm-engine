services:
  selenium-llm-engine:
    # build: . # If you want to build from source, uncomment this and comment out the image line
    image: xargonwan/selenium-llm-engine:latest
    container_name: selenium-llm-engine
    ports:
      - "14848:8000"  # API port
      - "3006:3000"   # webtop interface
    volumes:
      - data:/app/data
      - config:/config
volumes:
  data:
  config:

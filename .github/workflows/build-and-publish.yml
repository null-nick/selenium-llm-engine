name: "Selenium LLM Engine - Build and Publish"

on:
  push:
    branches: ["main", "develop", "release/**", "feat/**", "fix/**"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get short commit
        id: version
        run: |
          TAG="${GITHUB_SHA:0:7}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_RUN_ID}"
          fi
          if [ -z "$TAG" ]; then
            TAG="$(date +%s)"
          fi
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/selenium-llm-engine
      IMAGE_TAG: ${{ needs.prepare.outputs.TAG || github.run_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate image parameters
        run: |
          if [ -z "$IMAGE_NAME" ] || [ -z "$IMAGE_TAG" ]; then
            echo "IMAGE_NAME or IMAGE_TAG is empty (IMAGE_NAME='$IMAGE_NAME' IMAGE_TAG='$IMAGE_TAG')" >&2
            exit 1
          fi
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image for ${{ matrix.arch }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            TARGETARCH=${{ matrix.arch }}

      - name: Save image digest artifact
        run: |
          echo "${{ steps.build.outputs.digest }}" > digest-${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: digest-${{ matrix.arch }}

  tests:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run tests
        run: pytest -q

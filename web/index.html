<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selenium LLM Engine Control Panel</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        button, input, select, textarea { margin: 4px 0; width: 100%; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        pre { background: #f5f5f5; padding: 8px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Selenium LLM Engine</h1>
    <div class="card">
        <h2>Status</h2>
        <button onclick="refreshStats()">Refresh stats</button>
        <button onclick="clearState()">Clear state</button>
        <div id="stats"></div>
    </div>
    <div class="card">
        <h2>Login engines</h2>
        <button onclick="startLogin('chatgpt')">Login ChatGPT</button>
        <button onclick="startLogin('gemini')">Login Gemini</button>
        <div id="login-state"></div>
    </div>
    <div class="card">
        <h2>Send Prompt</h2>
        <select id="engine-select">
            <option value="chatgpt">ChatGPT</option>
            <option value="gemini">Gemini</option>
        </select>
        <textarea id="prompt-input" rows="4" placeholder="Type prompt..."></textarea>
        <button onclick="sendPrompt()">Send</button>
        <h3>Response</h3>
        <pre id="response-box"></pre>
    </div>

    <div class="card">
        <h2>LLM Prompt/Response History</h2>
        <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; align-items: center;">
            <select id="history-engine-filter" style="width: auto; min-width: 150px;">
                <option value="">All engines</option>
                <option value="chatgpt">ChatGPT</option>
                <option value="gemini">Gemini</option>
            </select>
            <input id="history-model-filter" placeholder="Model filter (optional)" style="width: auto; flex: 1; min-width: 150px;" />
            <select id="history-status-filter" style="width: auto; min-width: 140px;">
                <option value="">All status</option>
                <option value="ok">ok</option>
                <option value="error">error</option>
            </select>
            <label style="display:flex; align-items: center; gap: 6px; margin-left: 8px;">
                <input id="history-autoscroll" type="checkbox" checked /> Auto scroll
            </label>
            <button onclick="refreshHistory()" style="width: auto;">Refresh history</button>
        </div>
        <div id="history-content" style="max-height: 360px; overflow-y: auto; font-family: monospace; white-space: pre-wrap;"></div>
    </div>

    <script>

        function apiUrl(path) {
            // Always use the same origin as the page (protocol, host, port)
            if (path.startsWith("http")) return path;
            if (!path.startsWith("/")) path = "/" + path;
            return window.location.origin + path;
        }

        async function fetchJson(url, opts) {
            const res = await fetch(apiUrl(url), opts);
            if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
            return await res.json();
        }

        async function refreshStats() {
            const data = await fetchJson('/stats');
            document.getElementById('stats').textContent = JSON.stringify(data, null, 2);
        }

        async function startLogin(engine) {
            const state = await fetchJson(`/login/${engine}`, { method: 'POST' });
            const stateDiv = document.getElementById('login-state');
            stateDiv.textContent = `${engine}: ${JSON.stringify(state)}`;
        }

        async function clearState() {
            let apiOk = false;
            let apiMsg = '';
            try {
                const res = await fetchJson('/reset', { method: 'POST' });
                apiOk = true;
                apiMsg = `${res.status} - ${res.message}`;
            } catch (err) {
                apiMsg = `Reset call failed: ${err.message}`;
            } finally {
                // Always clean up the UI, regardless of whether the API call succeeded
                const loginStateDiv = document.getElementById('login-state');
                if (loginStateDiv) loginStateDiv.textContent = 'Cleared. Please re-login.';

                const responseBox = document.getElementById('response-box');
                if (responseBox) responseBox.textContent = '';

                const statsDiv = document.getElementById('stats');
                if (statsDiv) statsDiv.textContent = apiOk ? 'State cleared.' : `State cleared (UI only). ${apiMsg}`;
            }
            if (apiOk) alert(`Reset status: ${apiMsg}`);
            refreshStats();
        }

        async function refreshHistory() {
            const engine = document.getElementById('history-engine-filter').value;
            const model = document.getElementById('history-model-filter').value;
            const status = document.getElementById('history-status-filter').value;
            const params = new URLSearchParams({ limit: '200', engine, model, status });
            const entries = await fetchJson(`/logs?${params}`);
            const contentEl = document.getElementById('history-content');
            if (!Array.isArray(entries)) {
                contentEl.textContent = 'Failed to load history';
                return;
            }
            if (entries.length === 0) {
                contentEl.textContent = 'No history entries yet.';
                return;
            }
            contentEl.innerHTML = entries
                .map(e => {
                    const date = e.created_at;
                    const safePrompt = e.prompt ? e.prompt.replace(/</g, '&lt;').replace(/>/g, '&gt;') : '';
                    const safeResp = e.response ? e.response.replace(/</g, '&lt;').replace(/>/g, '&gt;') : '';
                    return `✅ [${date}] ${e.engine}/${e.model} (${e.status}/${e.elapsed_ms}ms)\n` +
                        `Prompt: ${safePrompt}\nResponse: ${safeResp}\n` +
                        `----\n`;
                })
                .join('');

            const autoscroll = document.getElementById('history-autoscroll');
            if (autoscroll && autoscroll.checked) {
                contentEl.scrollTop = contentEl.scrollHeight;
            }
        }

        function setupAutoscrollPersistence() {
            const checkbox = document.getElementById('history-autoscroll');
            if (!checkbox) return;

            const saved = localStorage.getItem('history_autoscroll_enabled');
            if (saved === null) {
                checkbox.checked = true; // default on
            } else {
                checkbox.checked = saved === 'true';
            }

            checkbox.addEventListener('change', () => {
                localStorage.setItem('history_autoscroll_enabled', checkbox.checked ? 'true' : 'false');
            });
        }

        window.addEventListener('load', () => {
            setupAutoscrollPersistence();
            refreshHistory();
        });

        async function sendPrompt() {
            const engine = document.getElementById('engine-select').value;
            const prompt = document.getElementById('prompt-input').value;
            const path = `/${engine}/prompt`;
            const body = { prompt };
            try {
                const res = await fetchJson(path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                document.getElementById('response-box').textContent = JSON.stringify(res, null, 2);
            } catch (err) {
                document.getElementById('response-box').textContent = err.message;
            } finally {
                // Always refresh history: the backend logs both successes and errors
                await refreshHistory();
            }
        }

        refreshStats();
    </script>
</body>
</html>
